name: FinansFlow
options:
  developmentLanguage: tr
  bundleIdPrefix: com.finansflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: "NO"

configs:
  Debug: debug
  Release: release

targets:
  FinansFlow:
    type: application
    platform: iOS
    sources:
      - path: FinansFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finansflow.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - sdk: SwiftData.framework
    postCompileScripts: []

  FinansFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FinansFlowTests
    dependencies:
      - target: FinansFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finansflow.app.tests
        GENERATE_INFOPLIST_FILE: true

  FinansFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FinansFlowUITests
    dependencies:
      - target: FinansFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.finansflow.app.uitests
        GENERATE_INFOPLIST_FILE: true

